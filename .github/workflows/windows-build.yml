name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build app
        shell: pwsh
        run: .\build.ps1

      - name: Upload release package
        uses: actions/upload-artifact@v5
        with:
          name: ClipNoteAI
          path: release/ClipNoteAI.zip

